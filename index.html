<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>Quiz</title>

  <body>
    <style>
      :root {
        --bg: #1a1f33;
        --card: #252b42;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --muted: #a5b4fc;
        --success: #34d399;
        --danger: #f87171;
        --text: #f1f5f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      .hidden {
        display: none;
      }

      .welcome {
        text-align: center;
        padding: 40px;
        background: var(--card);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transform: translateY(0);
        transition: transform 0.3s ease;
      }

      .welcome:hover {
        transform: translateY(-5px);
      }

      .welcome h1 {
        margin-bottom: 20px;
        color: var(--accent);
        font-size: 2.2rem;
      }

      .welcome button {
        background: linear-gradient(45deg, var(--accent), var(--accent-hover));
        color: white;
        border: none;
        padding: 14px 32px;
        font-size: 1.1rem;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        transition: all 0.3s ease;
      }

      .welcome button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }

      main.card {
        background: var(--card);
        border-radius: 20px;
        padding: 24px;
        max-width: 680px;
        width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.01)
        );
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      header h1 {
        font-size: 1.8rem;
        margin: 0;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      #back {
        background: transparent;
        color: var(--accent);
        border: 2px solid var(--accent);
        padding: 10px 22px;
        border-radius: 24px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin: 10px;
      }

      #back:hover {
        background: var(--accent);
        color: #fff;
        transform: translateY(-2px);
      }

      #back:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Responsive for mobile */
      @media (max-width: 480px) {
        #back {
          width: 100%;
          padding: 12px 0;
          font-size: 14px;
        }
      }

      .question {
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        margin-bottom: 16px;
      }

      .q-text {
        font-size: 1.2rem;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .choice {
        padding: 12px 16px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
        font-size: 0.95rem;
      }

      .choice:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .choice.selected {
        border-color: var(--accent);
        background: rgba(99, 102, 241, 0.1);
      }

      .choice.correct {
        background: rgba(52, 211, 153, 0.15);
        border-color: var(--success);
      }

      .choice.wrong {
        background: rgba(248, 113, 113, 0.15);
        border-color: var(--danger);
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
      }

      button {
        background: linear-gradient(45deg, var(--accent), var(--accent-hover));
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }

      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      #restartBtn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: none;
      }

      #restartBtn:hover {
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .meta {
        margin: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .scoreboard {
        display: flex;
        gap: 16px;
        align-items: center;
        margin: 10px;
      }

      .small {
        font-size: 0.85rem;
        color: var(--muted);
      }

      @media (max-width: 560px) {
        .choices {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 20px;
        }
        .welcome {
          padding: 24px;
        }
      }
    </style>
    <!-- Welcome Page -->
    <div id="welcomePage" class="welcome">
      <h1>Welcome to the Quiz!</h1>
      <p>Test your knowledge in Information Tecnology</p>

      <button id="startBtn">Start Quiz</button>
    </div>

    <!-- Quiz Page -->
    <main id="quizPage" class="card hidden" role="main">
      <div>
        <button id="back">Back</button>
      </div>
      <header>
        <div>
          <h1>Multiple Choice Quiz</h1>
          <p>Practice questions. Click an answer then "Check".</p>
        </div>
      </header>
      <div class="scoreboard">
        <div class="small">
          Question <strong id="current">1</strong>/<span id="total">0</span>
        </div>
        <div class="small">Score: <strong id="score">0</strong></div>
      </div>
      <section class="question" aria-live="polite">
        <div class="q-text" id="qtext">Loading...</div>
        <div class="choices" id="choices"></div>
      </section>

      <footer>
        <div>
          <div class="meta" id="feedback">
            Select an answer and press Check.
          </div>
          <button id="checkBtn">Check</button>
          <button id="nextBtn" style="margin-left: 8px">Next</button>
          <button
            id="restartBtn"
            style="
              margin-left: 8px;
              background: transparent;
              border: 1px solid rgba(255, 255, 255, 0.06);
            "
          >
            Restart
          </button>
        </div>
      </footer>
    </main>

    <script>
      const welcomePage = document.getElementById("welcomePage");
      const quizPage = document.getElementById("quizPage");
      const startBtn = document.getElementById("startBtn");
      const backBtn = document.getElementById("back"); // your back button

      // Start quiz
      startBtn.addEventListener("click", () => {
        welcomePage.classList.add("hidden");
        quizPage.classList.remove("hidden");
      });

      // Back to welcome
      backBtn.addEventListener("click", () => {
        quizPage.classList.add("hidden");
        welcomePage.classList.remove("hidden");
      });
    </script>

      // --- JS logic (shuffle + score) ---
      let current = 0;
      let selected = null;
      let score = 0;

      const totalEl = document.getElementById("total");
      const currentEl = document.getElementById("current");
      const scoreEl = document.getElementById("score");
      const qtext = document.getElementById("qtext");
      const choicesEl = document.getElementById("choices");
      const feedback = document.getElementById("feedback");
      const checkBtn = document.getElementById("checkBtn");
      const nextBtn = document.getElementById("nextBtn");
      const restartBtn = document.getElementById("restartBtn");

      totalEl.textContent = questions.length;

      // Shuffle choices
      function shuffleChoices(q) {
        const choicesCopy = q.choices.map((c, i) => ({ text: c, index: i }));
        for (let i = choicesCopy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [choicesCopy[i], choicesCopy[j]] = [choicesCopy[j], choicesCopy[i]];
        }
        q.shuffledChoices = choicesCopy.map((c) => c.text);
        q.shuffledAnswer = choicesCopy.findIndex((c) => c.index === q.answer);
      }

      function renderQuestion() {
        selected = null;
        checkBtn.disabled = false;
        nextBtn.disabled = true;
        feedback.textContent = "Select an answer and press Check.";
        currentEl.textContent = current + 1;

        const item = questions[current];
        shuffleChoices(item);

        qtext.textContent = item.q;
        choicesEl.innerHTML = "";

        item.shuffledChoices.forEach((c, i) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.type = "button";
          // Display the HTML tags as plain text
          btn.textContent = `${String.fromCharCode(65 + i)}. ${c}`;
          btn.dataset.index = i;
          btn.addEventListener("click", () => {
            [...choicesEl.children].forEach((x) =>
              x.classList.remove("selected"),
            );
            btn.classList.add("selected");
            selected = i;
          });
          choicesEl.appendChild(btn);
        });
      }

      checkBtn.addEventListener("click", () => {
        if (selected === null) {
          feedback.textContent = "Please choose an answer first.";
          return;
        }
        const q = questions[current];
        const correct = q.shuffledAnswer;

        [...choicesEl.children].forEach((el, i) => {
          el.disabled = true;
          if (i == correct) el.classList.add("correct");
          if (i == selected && selected != correct) el.classList.add("wrong");
        });

        if (selected === correct) {
          score += 2;
          feedback.textContent = "Correct!";
        } else {
          feedback.textContent = `Wrong! Correct answer is ${String.fromCharCode(
            65 + correct,
          )}.`;
        }
        scoreEl.textContent = score;
        checkBtn.disabled = true;
        nextBtn.disabled = false;
      });

      restartBtn.style.display = "none";

      nextBtn.addEventListener("click", () => {
        if (current < questions.length - 1) {
          current++;
          renderQuestion();
        } else {
          qtext.textContent = "Quiz complete!";
          let feedbackMsg = `You scored <strong>${score}</strong> out of <strong>${
            questions.length * 2
          }</strong>.`;
          if (score < 40) {
            feedbackMsg += "<br><strong>You did poorly! 😢 Try again!</strong>";
          } else {
            feedbackMsg += "<br><strong>Well done! 🎉</strong>";
          }
          choicesEl.innerHTML = `<div class="small">${feedbackMsg}</div>`;
          feedback.textContent = "Press Restart to try again.";
          checkBtn.disabled = true;
          nextBtn.disabled = true;
          restartBtn.style.display = "inline-block";
          restartBtn.focus();
        }
      });

      restartBtn.addEventListener("click", () => {
        current = 0;
        score = 0;
        scoreEl.textContent = score;
        renderQuestion();
        checkBtn.disabled = false;
        nextBtn.disabled = true;
        restartBtn.style.display = "none";
      });

      // Initialize
      renderQuestion();
    </script>
