<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="/image/image.png" type="image.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <title>Quiz</title>
  </head>
  <body>
    <div id="welcomePage" class="welcome">
      <h1>Welcome to the Quiz!</h1>
      <p>Test your knowledge in Information Technology</p>
      <button id="startBtn">Start Quiz</button>
    </div>

    <div id="categoryPage" class="welcome hidden">
      <h1>Choose a Topic</h1>
      <p>Select the category you want to practice:</p>
      <div class="category-container">
        <div class="category-container">
          <button class="category-btn" data-category="Programming">
            <i class="fa-solid fa-code" style="margin-right: 8px"></i>
            Programming
          </button>
          <button class="category-btn" data-category="Network">
            <i class="fa-solid fa-network-wired" style="margin-right: 8px"></i>
            Network
          </button>
          <button class="category-btn" data-category="Database">
            <i class="fa-solid fa-database" style="margin-right: 8px"></i>
            Database
          </button>
        </div>
      </div>
      <button
        id="categoryBackBtn"
        style="
          display: inline-flex;
          align-items: center;
          justify-content: center;
          margin-top: 12px;
        "
      >
        <i class="fa-solid fa-arrow-left" style="margin-right: 8px"></i> Back
      </button>
    </div>

    <main id="quizPage" class="card hidden" role="main">
      <div>
        <button id="back">
          <i class="fa-solid fa-arrow-left" style="margin-right: 8px"></i> Back
        </button>
      </div>
      <header>
        <div>
          <h1 id="quizTitle">Multiple Choice Quiz</h1>
          <p id="quizSubTitle">
            Practice questions. Click an answer then "Check".
          </p>
        </div>
      </header>
      <div class="scoreboard">
        <div class="small">
          Question <strong id="current">1</strong>/<span id="total">0</span>
        </div>
        <div class="small">Score: <strong id="score">0</strong></div>
      </div>
      <section class="question" aria-live="polite">
        <div class="q-text" id="qtext">Loading...</div>
        <div class="choices" id="choices"></div>
      </section>

      <footer>
        <div class="meta" id="feedback">Select an answer and press Check.</div>
        <div>
          <button
            id="checkBtn"
            style="display: inline-flex; align-items: center; font-size: 1rem"
          >
            <i class="fa-solid fa-circle-check" style="margin-right: 8px"></i>
            Check
          </button>

          <button
            id="nextBtn"
            style="
              margin-left: 8px;
              display: inline-flex;
              align-items: center;
              font-size: 1rem;
            "
          >
            Next
            <i class="fa-solid fa-arrow-right" style="margin-left: 8px"></i>
          </button>

          <button
            id="restartBtn"
            style="margin-left: 8px; display: inline-flex; align-items: center"
          >
            <i class="fa-solid fa-rotate-right" style="margin-right: 8px"></i>
            Restart
          </button>
        </div>
      </footer>
    </main>

    <script>
      const welcomePage = document.getElementById("welcomePage");
      const categoryPage = document.getElementById("categoryPage");
      const quizPage = document.getElementById("quizPage");

      const startBtn = document.getElementById("startBtn");
      const categoryBackBtn = document.getElementById("categoryBackBtn");
      const backBtn = document.getElementById("back");
      const categoryButtons = document.querySelectorAll(".category-btn");

      // Welcome -> Category
      startBtn.addEventListener("click", () => {
        welcomePage.classList.add("hidden");
        categoryPage.classList.remove("hidden");
      });

      // Category -> Welcome
      categoryBackBtn.addEventListener("click", () => {
        categoryPage.classList.add("hidden");
        welcomePage.classList.remove("hidden");
      });

      // Category -> Quiz Page
      categoryButtons.forEach((button) => {
        button.addEventListener("click", (e) => {
          const selectedCategory = e.target.getAttribute("data-category");

          categoryPage.classList.add("hidden");
          quizPage.classList.remove("hidden");

          document.getElementById("quizTitle").innerText = selectedCategory;

          // ហៅ Logic ចាប់ផ្តើម Quiz ពី main.js
          startQuizByCategory(selectedCategory);
        });
      });

      // Quiz Page -> Category
      backBtn.addEventListener("click", () => {
        quizPage.classList.add("hidden");
        categoryPage.classList.remove("hidden");
      });
    </script>

    <script src="main.js"></script>
  </body>
</html>
